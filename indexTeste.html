<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style3.css">
    <title>Pitanguinha Cafeteria</title>
</head>
<body>
    <header>
        <div class="container topo">
            <h1 class="logo">Pitanguinha Cafeteria</h1>
            <nav>
                <a href="">Inicio</a>
                <a href="">Produto</a>
                <a href="">Sobre</a>
                <a href="">Contato</a>
            </nav>
        </div>
    </header>
    <!-- É como a div mas ela é focada num bloco de contúdo com um tema específico -->
    <!-- Quando tem a classe hero quer dizer aqui será o tma pincipal -->
    <section class="hero">
        <div class="container hero-content">
            <div class="hero-text">
                <h2>Café especial para começar bem o seu dia</h2>
                <p>Conheça o novo café premum da Pitanguinha Café, com aroma marcante, sabor equilibrado
                    e grãos selecionados.
                </p>
                <a href="">Comprar agora</a>
            </div>

            <div class="hero-image">
                <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80" 
                alt="Imagem principal">

            </div>
        </div>
    </section>
</body>
</html>
